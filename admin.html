<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заявки — Aurelie Admin</title>
<link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
<style>
  .admin-header{
    position:sticky; top:0; z-index:100; background:var(--bg-card); border-bottom:1px solid var(--line);
    padding:16px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
  }
  .admin-header__title{ display:flex; align-items:center; gap:10px; font-weight:800; font-size:1.05rem; }
  .admin-header__user{ display:flex; align-items:center; gap:10px; font-size:.86rem; color:var(--ink-soft); flex-wrap:wrap; }
  .admin-logout{
    display:flex; align-items:center; gap:6px; padding:8px 14px; border-radius:100px;
    border:1px solid var(--line); color:var(--ink-soft); font-size:.82rem; font-weight:600;
    background:transparent;
  }
  .admin-logout:hover{ background:var(--bg-alt); color:var(--ink); }
  .admin-nav-btn{
    display:flex; align-items:center; gap:7px; padding:10px 18px; border-radius:100px;
    border:1.5px solid var(--gold); color:#0B2338; font-size:.86rem; font-weight:800;
    background:var(--gold-soft); transition:all var(--transition);
  }
  .admin-nav-btn:hover{ background:var(--gold); transform:translateY(-1px); }
  .admin-nav-btn.is-current{ background:var(--gold); box-shadow:var(--shadow-sm); }
  .admin-body{ max-width:1000px; margin:0 auto; padding:24px; }

  @media (max-width:640px){
    .admin-header{ padding:12px 16px; }
    .admin-header__title{ font-size:.92rem; }
    .admin-header__user{ font-size:.78rem; gap:8px; width:100%; }
    .admin-header__user > span{ width:100%; order:-1; margin-bottom:2px; font-size:.76rem; }
    .admin-logout{ padding:7px 11px; font-size:.76rem; }
    .admin-body{ padding:16px; }
    .admin-stats{ grid-template-columns:repeat(2, 1fr); }
    .stat-card{ padding:14px 16px; }
    .stat-card__value{ font-size:1.2rem; }
  }
  .admin-tabs{ display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
  .admin-stats{
    display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:14px; margin-bottom:24px;
  }
  .stat-card{
    background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius-md);
    padding:18px 20px;
  }
  .stat-card__label{ font-size:.78rem; color:var(--ink-soft); font-weight:600; margin-bottom:6px; }
  .stat-card__value{ font-size:1.5rem; font-weight:800; }
  .stat-card--income .stat-card__value{ color:#276B37; }
  .stat-card--pending .stat-card__value{ color:#8A6D1D; }
  .stat-card--expense .stat-card__value{ color:#B3261E; }
  .stat-card--profit .stat-card__value{ color:#1E6FBF; }
  @media (max-width:700px){
    .admin-stats{ grid-template-columns:repeat(2, 1fr); }
  }
  .admin-sections{
    display:flex; gap:6px; margin-bottom:24px; background:var(--bg-alt); border:1px solid var(--line);
    border-radius:16px; padding:6px; width:fit-content;
  }
  .admin-section-btn{
    padding:12px 24px; border-radius:12px; border:none; font-size:.92rem; font-weight:800;
    color:var(--ink-soft); background:transparent; display:flex; align-items:center; gap:8px;
  }
  .admin-section-btn.is-active{ background:var(--bg-card); color:#0B2338; box-shadow:var(--shadow-sm); }
  .expense-form{
    background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius-md);
    padding:18px 20px; margin-bottom:20px; display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;
  }
  .expense-form .form-group{ flex:1; min-width:130px; margin-bottom:0; }
  .expense-form label{ font-size:.76rem; font-weight:600; color:var(--ink-soft); display:block; margin-bottom:5px; }
  .expense-form input, .expense-form select{
    width:100%; padding:10px 12px; border:1.5px solid var(--line); border-radius:10px; background:var(--bg);
    color:var(--ink); font-size:14px; font-family:inherit;
  }
  .expense-form button{
    padding:11px 20px; border-radius:100px; background:var(--ink); color:var(--bg); font-weight:700;
    font-size:.84rem; border:none; white-space:nowrap;
  }
  .expense-row{
    background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius-md);
    padding:14px 18px; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .expense-row__desc{ font-weight:700; font-size:.92rem; }
  .expense-row__meta{ font-size:.78rem; color:var(--ink-soft); }
  .expense-row__amount{ font-weight:800; color:#B3261E; font-size:1rem; }
  .expense-row__delete{
    width:30px; height:30px; border-radius:50%; background:var(--bg-alt); color:var(--ink-soft);
    border:none; flex-shrink:0;
  }
  .expense-row__delete:hover{ background:#FCE8E6; color:#B3261E; }
  .admin-tab{
    padding:9px 18px; border-radius:100px; border:1px solid var(--line); font-size:.84rem; font-weight:600;
    color:var(--ink-soft); background:var(--bg-card);
  }
  .admin-tab.is-active{ background:var(--ink); color:var(--bg); border-color:var(--ink); }
  .booking-card{
    background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius-md);
    padding:20px; margin-bottom:14px; display:flex; flex-wrap:wrap; gap:16px; align-items:flex-start;
  }
  .booking-card__main{ flex:1; min-width:220px; }
  .booking-card__name{ font-weight:700; font-size:1rem; margin-bottom:2px; }
  .booking-card__phone{ color:var(--ink-soft); font-size:.86rem; margin-bottom:10px; }
  .booking-card__row{ display:flex; gap:8px; font-size:.86rem; margin-bottom:4px; }
  .booking-card__row i{ width:16px; color:var(--gold); }
  .booking-card__services{ color:var(--ink-soft); }
  .booking-card__side{ text-align:right; min-width:140px; }
  .booking-card__price{ font-weight:800; font-size:1.05rem; margin-bottom:8px; }
  .status-badge{
    display:inline-block; padding:4px 12px; border-radius:100px; font-size:.74rem; font-weight:700;
    margin-bottom:12px;
  }
  .status-pending{ background:#FFF3CD; color:#8A6D1D; }
  .status-confirmed{ background:#D4EDDA; color:#276B37; }
  .status-cancelled{ background:#FCE8E6; color:#B3261E; }
  .status-completed{ background:var(--bg-alt); color:var(--ink-soft); }
  .booking-card__actions{ display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; }
  .booking-card__actions button{
    padding:7px 14px; border-radius:100px; font-size:.78rem; font-weight:700; border:1px solid var(--line);
  }
  .btn-confirm{ background:#276B37; color:#fff; border-color:#276B37; }
  .btn-cancel{ background:var(--bg-alt); color:var(--ink); }
  .btn-complete{ background:var(--ink); color:var(--bg); border-color:var(--ink); }
  .btn-prepay{
    display:inline-flex; align-items:center; padding:7px 14px; border-radius:100px; font-size:.78rem; font-weight:700;
    background:#25D366; color:#fff; border:1px solid #25D366; text-decoration:none;
  }
  .admin-empty{ text-align:center; padding:60px 20px; color:var(--ink-soft); }
  .admin-loading{ text-align:center; padding:60px 20px; color:var(--ink-soft); }
</style>
</head>
<body>

<header class="admin-header">
  <div class="admin-header__title"><span class="logo__mark">A</span> Aurelie — Заявки</div>
  <div class="admin-header__user">
    <span id="adminEmail"></span>
    <a href="clients.html" class="admin-nav-btn"><i class="fa-solid fa-users"></i> Клиенты</a>
    <a href="analytics.html" class="admin-nav-btn"><i class="fa-solid fa-chart-pie"></i> Аналитика</a>
    <a href="#" class="admin-logout" id="logoutBtn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Выйти</a>
  </div>
</header>

<main class="admin-body">
  <div class="admin-stats" id="adminStats">
    <div class="stat-card">
      <div class="stat-card__label">Записей сегодня</div>
      <div class="stat-card__value" id="statToday">—</div>
    </div>
    <div class="stat-card stat-card--pending">
      <div class="stat-card__label">Новых заявок</div>
      <div class="stat-card__value" id="statPending">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__label">Всего заявок</div>
      <div class="stat-card__value" id="statTotal">—</div>
    </div>
  </div>

  <div class="admin-sections">
    <button class="admin-section-btn is-active" data-section="bookings"><i class="fa-solid fa-list-check"></i> Заявки</button>
    <button class="admin-section-btn" data-section="expenses"><i class="fa-solid fa-wallet"></i> Расходы</button>
  </div>

  <div id="bookingsSection">
    <div class="admin-tabs" id="adminTabs">
      <button class="admin-tab is-active" data-status="all">Все</button>
      <button class="admin-tab" data-status="pending">Новые</button>
      <button class="admin-tab" data-status="confirmed">Подтверждённые</button>
      <button class="admin-tab" data-status="completed">Завершённые</button>
      <button class="admin-tab" data-status="cancelled">Отменённые</button>
    </div>

    <div id="bookingsList">
      <div class="admin-loading">Загрузка заявок...</div>
    </div>
  </div>

  <div id="expensesSection" style="display:none;">
    <form class="expense-form" id="expenseForm">
      <div class="form-group">
        <label for="expDesc">Описание</label>
        <input type="text" id="expDesc" placeholder="Например: аренда за июль" required>
      </div>
      <div class="form-group">
        <label for="expAmount">Сумма, сом</label>
        <input type="number" id="expAmount" min="1" required>
      </div>
      <div class="form-group">
        <label for="expCategory">Категория</label>
        <select id="expCategory">
          <option value="Аренда">Аренда</option>
          <option value="Косметика">Косметика и материалы</option>
          <option value="Реклама">Реклама</option>
          <option value="Зарплата">Зарплата</option>
          <option value="Другое">Другое</option>
        </select>
      </div>
      <div class="form-group" id="expSpecialistGroup" style="display:none;">
        <label for="expSpecialist">Кому (мастер)</label>
        <select id="expSpecialist"></select>
      </div>
      <div class="form-group">
        <label for="expDate">Дата</label>
        <input type="date" id="expDate" required>
      </div>
      <button type="submit">Добавить расход</button>
    </form>

    <div id="expensesList">
      <div class="admin-loading">Загрузка расходов...</div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://iuwyjhltxrdcrtvvaawh.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_8sRsLw4ZhDgXCDxMMdc3CA_GayUBCYL';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let allBookings = [];
  let serviceMap = {};
  let currentFilter = 'all';

  async function init(){
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session){ window.location.href = 'admin-login.html'; return; }

    const { data: staffRow } = await supabaseClient
      .from('staff').select('role').eq('user_id', session.user.id).maybeSingle();
    if (staffRow && staffRow.role === 'specialist'){
      window.location.href = 'my-bookings.html'; return;
    }
    document.getElementById('adminEmail').textContent = session.user.email;

    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      await supabaseClient.auth.signOut();
      window.location.href = 'admin-login.html';
    });

    document.querySelectorAll('.admin-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('is-active'));
        tab.classList.add('is-active');
        currentFilter = tab.dataset.status;
        renderBookings();
      });
    });

    document.querySelectorAll('.admin-section-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.admin-section-btn').forEach(b => b.classList.remove('is-active'));
        btn.classList.add('is-active');
        const section = btn.dataset.section;
        document.getElementById('bookingsSection').style.display = section === 'bookings' ? '' : 'none';
        document.getElementById('expensesSection').style.display = section === 'expenses' ? '' : 'none';
      });
    });

    document.getElementById('expDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('expCategory').addEventListener('change', (e) => {
      document.getElementById('expSpecialistGroup').style.display = e.target.value === 'Зарплата' ? '' : 'none';
    });
    document.getElementById('expenseForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const description = document.getElementById('expDesc').value.trim();
      const amount = parseInt(document.getElementById('expAmount').value, 10);
      const category = document.getElementById('expCategory').value;
      const expense_date = document.getElementById('expDate').value;
      const specialist_id = category === 'Зарплата' ? (document.getElementById('expSpecialist').value || null) : null;
      if (!description || !amount) return;

      const { error } = await supabaseClient.from('expenses').insert({ description, amount, category, expense_date, specialist_id });
      if (error){ alert('Не удалось добавить расход: ' + error.message); return; }
      e.target.reset();
      document.getElementById('expDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('expSpecialistGroup').style.display = 'none';
      await loadExpenses();
    });

    await loadServices();
    await loadSpecialistsForForm();
    await loadBookings();
    await loadExpenses();
  }

  async function loadSpecialistsForForm(){
    const { data } = await supabaseClient.from('specialists').select('id, name').eq('is_active', true);
    const select = document.getElementById('expSpecialist');
    select.innerHTML = (data || []).map(s => `<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('');
  }

  let allExpenses = [];

  async function loadExpenses(){
    const { data, error } = await supabaseClient
      .from('expenses').select('*').order('expense_date', { ascending: false });
    if (error){
      document.getElementById('expensesList').innerHTML =
        '<div class="admin-empty">Не удалось загрузить расходы: ' + error.message + '</div>';
      return;
    }
    allExpenses = data || [];
    renderStats();
    renderExpenses();
  }

  function renderExpenses(){
    const list = document.getElementById('expensesList');
    if (!allExpenses.length){
      list.innerHTML = '<div class="admin-empty">Расходов пока нет</div>';
      return;
    }
    list.innerHTML = allExpenses.map(ex => {
      const dateDisplay = ex.expense_date ? new Date(ex.expense_date).toLocaleDateString('ru-RU', { day:'numeric', month:'long', year:'numeric' }) : '—';
      return `
        <div class="expense-row">
          <div>
            <div class="expense-row__desc">${escapeHtml(ex.description)}</div>
            <div class="expense-row__meta">${escapeHtml(ex.category || '')} · ${dateDisplay}</div>
          </div>
          <div style="display:flex; align-items:center; gap:14px;">
            <div class="expense-row__amount">−${ex.amount.toLocaleString('ru-RU')} сом</div>
            <button class="expense-row__delete" onclick="deleteExpense('${ex.id}')" aria-label="Удалить"><i class="fa-solid fa-xmark"></i></button>
          </div>
        </div>`;
    }).join('');
  }

  async function deleteExpense(id){
    if (!confirm('Удалить этот расход?')) return;
    const { error } = await supabaseClient.from('expenses').delete().eq('id', id);
    if (error){ alert('Не удалось удалить: ' + error.message); return; }
    await loadExpenses();
  }

  async function loadServices(){
    const { data } = await supabaseClient.from('services').select('id, name_ru, name_en, price');
    (data || []).forEach(s => { serviceMap[s.id] = { name: s.name_ru || s.name_en, price: s.price }; });
  }

  async function loadBookings(){
    const { data, error } = await supabaseClient
      .from('bookings')
      .select('*, specialists(name)')
      .order('booking_date', { ascending: true })
      .order('booking_time', { ascending: true });

    if (error){
      document.getElementById('bookingsList').innerHTML =
        '<div class="admin-empty">Не удалось загрузить заявки: ' + error.message + '</div>';
      return;
    }
    allBookings = data || [];
    renderStats();
    renderBookings();
  }

  const PAYMENT_METHOD = 'MBank';
  const PAYMENT_NUMBER = '+996 559 751 050';
  const PAYMENT_RECIPIENT = 'Байдоолот А.';

  function buildBookingSummary(b){
    const services = (b.service_ids || []).map(id => serviceMap[id]).filter(Boolean);
    const serviceLines = services.length
      ? services.map(s => `${s.name} — ${s.price} сом`).join('\n')
      : 'не указано';
    const specialistName = b.specialists ? b.specialists.name : 'Любой специалист';
    const dateDisplay = b.booking_date ? new Date(b.booking_date).toLocaleDateString('ru-RU', { day:'numeric', month:'long', year:'numeric' }) : '—';
    const timeDisplay = b.booking_time ? b.booking_time.slice(0,5) : '';
    return { serviceLines, specialistName, dateDisplay, timeDisplay };
  }

  function buildPrepaymentMessage(b){
    const { serviceLines, specialistName, dateDisplay, timeDisplay } = buildBookingSummary(b);
    const total = b.total_price || 0;
    const prepay = Math.round(total * 0.10);
    return `Здравствуйте, ${b.client_name}!

Вы записались в Aurelie Beauty Studio:
Мастер: ${specialistName}
Дата и время: ${dateDisplay}, ${timeDisplay}

Услуги:
${serviceLines}

Итого: ${total} сом

Для подтверждения записи, пожалуйста, внесите предоплату 10% — это ${prepay} сом.

Реквизиты для перевода:
${PAYMENT_METHOD}: ${PAYMENT_NUMBER}
Получатель: ${PAYMENT_RECIPIENT}

После оплаты, пожалуйста, пришлите сюда скриншот чека — и мы подтвердим вашу запись.`;
  }

  function buildConfirmationMessage(b){
    const { serviceLines, specialistName, dateDisplay, timeDisplay } = buildBookingSummary(b);
    const total = b.total_price || 0;
    const prepay = Math.round(total * 0.10);
    const remaining = total - prepay;
    return `Спасибо, ${b.client_name}! Ваша запись подтверждена.

Мастер: ${specialistName}
Дата и время: ${dateDisplay}, ${timeDisplay}

Услуги:
${serviceLines}

Итого: ${total} сом
Предоплата получена: ${prepay} сом
Остаток к оплате при визите: ${remaining} сом

Пожалуйста, приходите без опозданий.

Бесплатная отмена — за 24 часа до записи.
При отмене менее чем за 2 часа до записи предоплата не возвращается.

Ждём вас в Aurelie Beauty Studio! 💙`;
  }

  function whatsappLink(phone, message){
    const digits = (phone || '').replace(/\D/g, '');
    return 'https://wa.me/' + digits + '?text=' + encodeURIComponent(message);
  }

  function renderStats(){
    const today = new Date();
    const todayStr = today.toISOString().split('T')[0];

    const todayCount = allBookings.filter(b => b.booking_date === todayStr && b.status !== 'cancelled').length;
    const pendingCount = allBookings.filter(b => b.status === 'pending').length;
    const totalCount = allBookings.length;

    document.getElementById('statToday').textContent = todayCount;
    document.getElementById('statPending').textContent = pendingCount;
    document.getElementById('statTotal').textContent = totalCount;
  }

  function renderBookings(){
    const list = document.getElementById('bookingsList');
    const filtered = currentFilter === 'all'
      ? allBookings
      : allBookings.filter(b => b.status === currentFilter);

    if (!filtered.length){
      list.innerHTML = '<div class="admin-empty">Заявок пока нет</div>';
      return;
    }

    const statusLabels = { pending:'Новая', confirmed:'Подтверждена', cancelled:'Отменена', completed:'Завершена' };

    list.innerHTML = filtered.map(b => {
      const serviceNames = (b.service_ids || []).map(id => (serviceMap[id] ? serviceMap[id].name : '—')).join(', ');
      const specialistName = b.specialists ? b.specialists.name : 'Любой специалист';
      const dateDisplay = b.booking_date ? new Date(b.booking_date).toLocaleDateString('ru-RU', { day:'numeric', month:'long', year:'numeric' }) : '—';
      const timeDisplay = b.booking_time ? b.booking_time.slice(0,5) : '';
      const prepay = Math.round((b.total_price || 0) * 0.10);

      let actions = '';
      if (b.status === 'pending'){
        actions = `
          <a class="btn-prepay" href="${whatsappLink(b.client_phone, buildPrepaymentMessage(b))}" target="_blank" rel="noopener">Запросить предоплату (${prepay} сом)</a>
          <button class="btn-confirm" onclick="updateStatus('${b.id}','confirmed')">Подтвердить</button>
          <button class="btn-cancel" onclick="updateStatus('${b.id}','cancelled')">Отменить</button>`;
      } else if (b.status === 'confirmed'){
        actions = `
          <a class="btn-prepay" href="${whatsappLink(b.client_phone, buildConfirmationMessage(b))}" target="_blank" rel="noopener">Отправить подтверждение</a>
          <button class="btn-complete" onclick="updateStatus('${b.id}','completed')">Завершить</button>
          <button class="btn-cancel" onclick="updateStatus('${b.id}','cancelled')">Отменить</button>`;
      }

      return `
        <div class="booking-card">
          <div class="booking-card__main">
            <div class="booking-card__name">${escapeHtml(b.client_name)}</div>
            <div class="booking-card__phone">${escapeHtml(b.client_phone)}</div>
            <div class="booking-card__row"><i class="fa-solid fa-user"></i> ${escapeHtml(specialistName)}</div>
            <div class="booking-card__row"><i class="fa-regular fa-calendar"></i> ${dateDisplay} · ${timeDisplay}</div>
            <div class="booking-card__row booking-card__services"><i class="fa-solid fa-list"></i> ${serviceNames || 'не указано'}</div>
            ${b.comment ? `<div class="booking-card__row"><i class="fa-regular fa-comment"></i> ${escapeHtml(b.comment)}</div>` : ''}
          </div>
          <div class="booking-card__side">
            <span class="status-badge status-${b.status}">${statusLabels[b.status] || b.status}</span>
            <div class="booking-card__price">${b.total_price || 0} сом</div>
            <div class="booking-card__actions">${actions}</div>
          </div>
        </div>`;
    }).join('');
  }

  async function updateStatus(id, status){
    const { error } = await supabaseClient.from('bookings').update({ status }).eq('id', id);
    if (error){ alert('Не удалось обновить: ' + error.message); return; }
    await loadBookings();
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  init();
</script>
</body>
</html>
