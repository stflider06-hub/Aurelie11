<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аналитика — Aurelie Admin</title>
<link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
<style>
  .admin-header{
    position:sticky; top:0; z-index:100; background:var(--bg-card); border-bottom:1px solid var(--line);
    padding:16px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
  }
  .admin-header__title{ display:flex; align-items:center; gap:10px; font-weight:800; font-size:1.05rem; }
  .admin-header__user{ display:flex; align-items:center; gap:10px; font-size:.86rem; color:var(--ink-soft); flex-wrap:wrap; }
  .admin-logout{
    display:flex; align-items:center; gap:6px; padding:8px 14px; border-radius:100px;
    border:1px solid var(--line); color:var(--ink); font-size:.82rem; font-weight:600;
  }
  .admin-logout:hover{ background:var(--bg-alt); }
  .admin-body{ max-width:1000px; margin:0 auto; padding:24px; }

  @media (max-width:640px){
    .admin-header{ padding:12px 16px; }
    .admin-header__title{ font-size:.92rem; }
    .admin-header__user{ font-size:.78rem; gap:8px; width:100%; }
    .admin-header__user > span{ width:100%; order:-1; margin-bottom:2px; font-size:.76rem; }
    .admin-logout{ padding:7px 11px; font-size:.76rem; }
    .admin-body{ padding:16px; }
    .admin-stats{ grid-template-columns:repeat(2, 1fr); }
    .stat-card{ padding:14px 16px; }
    .stat-card__value{ font-size:1.2rem; }
  }

  .admin-stats{ display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:14px; margin-bottom:28px; }
  .stat-card{ background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius-md); padding:18px 20px; }
  .stat-card__label{ font-size:.78rem; color:var(--ink-soft); font-weight:600; margin-bottom:6px; }
  .stat-card__value{ font-size:1.5rem; font-weight:800; }
  .stat-card--income .stat-card__value{ color:#276B37; }
  .stat-card--expense .stat-card__value{ color:#B3261E; }
  .stat-card--profit .stat-card__value{ color:#1E6FBF; }

  .charts-grid{ display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:28px; }
  @media (max-width:800px){ .charts-grid{ grid-template-columns:1fr; } }
  .chart-card{
    background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius-md); padding:22px;
  }
  .chart-card h3{ font-size:1rem; margin-bottom:16px; }
  .chart-card__empty{ text-align:center; color:var(--ink-soft); font-size:.86rem; padding:40px 0; }
  .chart-legend{ display:flex; flex-direction:column; gap:8px; margin-top:16px; }
  .chart-legend__item{ display:flex; align-items:center; gap:8px; font-size:.82rem; }
  .chart-legend__dot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .chart-legend__label{ flex:1; }
  .chart-legend__value{ font-weight:700; }

  .salary-table{ background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius-md); overflow:hidden; }
  .salary-table h3{ padding:18px 20px 0; font-size:1rem; }
  .salary-row{
    display:flex; justify-content:space-between; align-items:center; padding:14px 20px; border-top:1px solid var(--line);
  }
  .salary-row__name{ font-weight:700; font-size:.92rem; }
  .salary-row__amount{ font-weight:800; color:#276B37; }
  .admin-empty{ text-align:center; padding:40px 20px; color:var(--ink-soft); }
</style>
</head>
<body>

<header class="admin-header">
  <div class="admin-header__title"><span class="logo__mark">A</span> Aurelie — Аналитика</div>
  <div class="admin-header__user">
    <span id="adminEmail"></span>
    <a href="admin.html" class="admin-logout"><i class="fa-solid fa-list"></i> Заявки</a>
    <a href="clients.html" class="admin-logout"><i class="fa-solid fa-users"></i> Клиенты</a>
    <a href="#" class="admin-logout" id="logoutBtn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Выйти</a>
  </div>
</header>

<main class="admin-body">
  <div class="admin-stats">
    <div class="stat-card stat-card--income">
      <div class="stat-card__label">Доход за месяц</div>
      <div class="stat-card__value" id="statIncome">—</div>
    </div>
    <div class="stat-card stat-card--expense">
      <div class="stat-card__label">Расход за месяц</div>
      <div class="stat-card__value" id="statExpense">—</div>
    </div>
    <div class="stat-card stat-card--profit">
      <div class="stat-card__label">Прибыль за месяц</div>
      <div class="stat-card__value" id="statProfit">—</div>
    </div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <h3>Расходы по категориям (за месяц)</h3>
      <canvas id="expenseChart" height="220"></canvas>
      <div class="chart-legend" id="expenseLegend"></div>
    </div>
    <div class="chart-card">
      <h3>Доход по мастерам (за месяц)</h3>
      <canvas id="incomeChart" height="220"></canvas>
      <div class="chart-legend" id="incomeLegend"></div>
    </div>
  </div>

  <div class="salary-table">
    <h3>Зарплаты по мастерам (за месяц)</h3>
    <div id="salaryList"></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>
  const SUPABASE_URL = 'https://iuwyjhltxrdcrtvvaawh.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_8sRsLw4ZhDgXCDxMMdc3CA_GayUBCYL';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const CHART_COLORS = ['#2E9BE0', '#B76E79', '#F5A623', '#276B37', '#8A6D1D', '#9B59B6', '#B3261E'];

  async function init(){
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session){ window.location.href = 'admin-login.html'; return; }
    document.getElementById('adminEmail').textContent = session.user.email;

    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      await supabaseClient.auth.signOut();
      window.location.href = 'admin-login.html';
    });

    const [bookingsRes, expensesRes, specialistsRes] = await Promise.all([
      supabaseClient.from('bookings').select('*, specialists(name)'),
      supabaseClient.from('expenses').select('*, specialists(name)'),
      supabaseClient.from('specialists').select('id, name')
    ]);

    const bookings = bookingsRes.data || [];
    const expenses = expensesRes.data || [];

    renderStats(bookings, expenses);
    renderExpenseChart(expenses);
    renderIncomeChart(bookings);
    renderSalaryTable(expenses);
  }

  function isThisMonth(dateStr){
    if (!dateStr) return false;
    const d = new Date(dateStr);
    const today = new Date();
    return d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear();
  }

  function renderStats(bookings, expenses){
    const income = bookings
      .filter(b => b.status === 'completed' && isThisMonth(b.booking_date))
      .reduce((sum, b) => sum + (b.total_price || 0), 0);
    const expense = expenses
      .filter(ex => isThisMonth(ex.expense_date))
      .reduce((sum, ex) => sum + (ex.amount || 0), 0);
    document.getElementById('statIncome').textContent = income.toLocaleString('ru-RU') + ' сом';
    document.getElementById('statExpense').textContent = expense.toLocaleString('ru-RU') + ' сом';
    document.getElementById('statProfit').textContent = (income - expense).toLocaleString('ru-RU') + ' сом';
  }

  function renderExpenseChart(expenses){
    const monthExpenses = expenses.filter(ex => isThisMonth(ex.expense_date));
    const byCategory = {};
    monthExpenses.forEach(ex => {
      const cat = ex.category || 'Другое';
      byCategory[cat] = (byCategory[cat] || 0) + (ex.amount || 0);
    });
    drawPieChart('expenseChart', 'expenseLegend', byCategory);
  }

  function renderIncomeChart(bookings){
    const monthCompleted = bookings.filter(b => b.status === 'completed' && isThisMonth(b.booking_date));
    const bySpecialist = {};
    monthCompleted.forEach(b => {
      const name = b.specialists ? b.specialists.name : 'Не указан';
      bySpecialist[name] = (bySpecialist[name] || 0) + (b.total_price || 0);
    });
    drawPieChart('incomeChart', 'incomeLegend', bySpecialist);
  }

  function drawPieChart(canvasId, legendId, dataObj){
    const canvas = document.getElementById(canvasId);
    const legendEl = document.getElementById(legendId);
    const entries = Object.entries(dataObj).filter(([, v]) => v > 0);

    if (!entries.length){
      canvas.style.display = 'none';
      legendEl.innerHTML = '<div class="chart-card__empty">Пока нет данных за этот месяц</div>';
      return;
    }

    const labels = entries.map(e => e[0]);
    const values = entries.map(e => e[1]);
    const total = values.reduce((a, b) => a + b, 0);
    const colors = labels.map((_, i) => CHART_COLORS[i % CHART_COLORS.length]);

    new Chart(canvas, {
      type: 'doughnut',
      data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 0 }] },
      options: {
        plugins: { legend: { display: false }, tooltip: { callbacks: {
          label: (ctx) => `${ctx.label}: ${ctx.parsed.toLocaleString('ru-RU')} сом`
        } } },
        cutout: '60%'
      }
    });

    legendEl.innerHTML = labels.map((label, i) => {
      const pct = Math.round((values[i] / total) * 100);
      return `
        <div class="chart-legend__item">
          <span class="chart-legend__dot" style="background:${colors[i]}"></span>
          <span class="chart-legend__label">${escapeHtml(label)}</span>
          <span class="chart-legend__value">${pct}% · ${values[i].toLocaleString('ru-RU')} сом</span>
        </div>`;
    }).join('');
  }

  function renderSalaryTable(expenses){
    const monthSalaries = expenses.filter(ex => isThisMonth(ex.expense_date) && ex.category === 'Зарплата');
    const bySpecialist = {};
    monthSalaries.forEach(ex => {
      const name = ex.specialists ? ex.specialists.name : 'Без привязки к мастеру';
      bySpecialist[name] = (bySpecialist[name] || 0) + (ex.amount || 0);
    });

    const list = document.getElementById('salaryList');
    const entries = Object.entries(bySpecialist);
    if (!entries.length){
      list.innerHTML = '<div class="admin-empty">Зарплатных выплат за этот месяц пока нет</div>';
      return;
    }
    list.innerHTML = entries.map(([name, amount]) => `
      <div class="salary-row">
        <span class="salary-row__name">${escapeHtml(name)}</span>
        <span class="salary-row__amount">${amount.toLocaleString('ru-RU')} сом</span>
      </div>`).join('');
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  init();
</script>
</body>
</html>
