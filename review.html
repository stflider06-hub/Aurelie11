<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review Your Booking — Aurelie</title>
<link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Manrope:wght@300;400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="loader" id="loader" aria-hidden="true">
  <div class="loader__mark"><span class="loader__glyph">A</span></div>
  <div class="loader__line"></div>
</div>

<div class="progress-bar" id="progressBar"></div>

<header class="header" id="header">
  <div class="container header__inner">
    <a href="specialists.html" class="page-back" aria-label="Back">
      <i class="fa-solid fa-arrow-left"></i>
    </a>
    <span class="page-header__title" data-i18n="review_page_title">Review Your Booking</span>
    <div class="header__actions">
      <div class="theme-switch" id="themeSwitch" role="group" aria-label="Toggle theme">
        <button class="theme-switch__btn" data-theme-choice="light" aria-label="Light theme"><i class="fa-solid fa-sun"></i></button>
        <button class="theme-switch__btn" data-theme-choice="dark" aria-label="Dark theme"><i class="fa-solid fa-moon"></i></button>
      </div>
      <div class="lang-select-wrap">
        <i class="fa-solid fa-language lang-select-wrap__icon"></i>
        <select class="lang-select" id="langSelect" aria-label="Choose language">
          <option value="en">EN</option>
          <option value="ru">RU 🇷🇺</option>
          <option value="kk">KZ 🇰🇿</option>
          <option value="ky">KG 🇰🇬</option>
          <option value="uz">UZ 🇺🇿</option>
        </select>
      </div>
    </div>
  </div>
</header>

<main>
  <section class="section" style="padding-top:140px; padding-bottom:40px;">
    <div class="container" style="max-width:640px;">

      <h2 class="section__title section__title--sm reveal" data-i18n="review_details_title">Booking Details</h2>

      <div class="review-block reveal">
        <div class="review-block__row">
          <img class="review-block__img" src="https://images.pexels.com/photos/3992863/pexels-photo-3992863.jpeg?auto=compress&cs=tinysrgb&w=100" alt="Aurelie Beauty Studio">
          <div class="review-block__body">
            <strong>Aurelie Beauty Studio</strong>
            <span>128 Maple Avenue, Suite 3, Springfield</span>
          </div>
        </div>
      </div>

      <div class="review-block reveal">
        <div class="review-block__row">
          <img class="review-block__img" id="reviewSpecialistImg" src="" alt="" style="display:none;">
          <div class="review-block__icon" id="reviewSpecialistIcon" style="display:none;"><i class="fa-solid fa-user-group"></i></div>
          <div class="review-block__body">
            <strong id="reviewSpecialistName">—</strong>
            <span id="reviewSpecialistRole"></span>
          </div>
          <a href="specialists.html" class="review-block__edit" aria-label="Edit specialist"><i class="fa-solid fa-pen"></i></a>
        </div>
        <div class="review-block__row">
          <div class="review-block__icon"><i class="fa-regular fa-calendar"></i></div>
          <div class="review-block__body">
            <strong id="reviewDate">—</strong>
            <span id="reviewTime"></span>
          </div>
          <a href="specialists.html" class="review-block__edit" aria-label="Edit date and time"><i class="fa-solid fa-pen"></i></a>
        </div>
      </div>

      <div class="review-block reveal">
        <div class="review-services__head">
          <h3 data-i18n="review_services_title">Services</h3>
          <span id="reviewServicesDuration"></span>
          <a href="services.html" class="review-block__edit" style="margin-left:auto;" aria-label="Edit services"><i class="fa-solid fa-pen"></i></a>
        </div>
        <div id="reviewServicesList"></div>
        <div class="review-total">
          <span data-i18n="review_total">Total</span>
          <strong id="reviewTotal">$0</strong>
        </div>
      </div>

      <div class="review-form reveal">
        <h3 data-i18n="review_form_title">Your Details</h3>
        <form id="reviewForm" novalidate>
          <div class="form-group">
            <label for="rName" data-i18n="form_name">Full Name</label><span class="required">*</span>
            <input type="text" id="rName" autocomplete="name" required>
          </div>
          <div class="form-group">
            <label for="rPhone" data-i18n="form_phone">Phone Number</label><span class="required">*</span>
            <input type="tel" id="rPhone" autocomplete="tel" placeholder="+996 (___) ___-___" required>
          </div>
          <div class="form-group">
            <label for="rComment" data-i18n="form_comment">Comment (optional)</label>
            <textarea id="rComment" maxlength="100" data-i18n-ph="review_comment_ph" placeholder="Anything we should know?"></textarea>
            <div class="char-counter"><span id="rCommentCount">0</span>/100</div>
          </div>
          <button type="submit" class="btn btn--gold btn--lg book-submit-btn" id="reviewSubmit" data-i18n="form_submit">Confirm Booking</button>
        </form>
      </div>

    </div>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
